<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard IoT ESP32</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{

            background: #0f172a;

            font-family: Arial, Helvetica, sans-serif;

            color: white;

            padding: 20px;
        }

        h1{

            text-align: center;

            margin-bottom: 30px;

            color: cyan;

            font-size: 3rem;
        }

        .contenedor{

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            gap: 20px;

            margin-bottom: 30px;
        }

        .card{

            background: #1e293b;

            border-radius: 20px;

            padding: 25px;

            text-align: center;

            box-shadow: 0 0 20px rgba(0,0,0,0.4);

            transition: 0.3s;
        }

        .card:hover{

            transform: scale(1.03);

            box-shadow: 0 0 25px cyan;
        }

        .titulo-card{

            font-size: 1.5rem;

            margin-bottom: 15px;

            color: #38bdf8;
        }

        .valor{

            font-size: 2.5rem;

            font-weight: bold;
        }

        .estado{

            font-size: 1.5rem;

            font-weight: bold;

            margin-top: 10px;
        }

        #led_virtual{

            width: 80px;

            height: 80px;

            border-radius: 50%;

            background: gray;

            margin: auto;

            margin-top: 20px;

            box-shadow: 0 0 20px gray;

            transition: 0.3s;
        }

        .slider-container{

            margin-top: 20px;
        }

        .slider{

            width: 100%;
        }

        .grafica{

            background: #1e293b;

            padding: 20px;

            border-radius: 20px;

            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        canvas{

            background: white;

            border-radius: 10px;

            padding: 10px;
        }

        .footer{

            margin-top: 30px;

            text-align: center;

            color: gray;
        }

    </style>

</head>

<body>

    <h1>🚀 Dashboard IoT ESP32</h1>

    <div class="contenedor">

        <!-- ADC -->

        <div class="card">

            <div class="titulo-card">
                ADC Sensor
            </div>

            <div class="valor" id="adc1">
                0.000 V
            </div>

        </div>

        <!-- PWM -->

        <div class="card">

            <div class="titulo-card">
                PWM LED
            </div>

            <div class="valor" id="pwm_valor">
                0 %
            </div>

            <div class="slider-container">

                <input
                    type="range"
                    min="0"
                    max="100"
                    value="0"
                    class="slider"
                    id="slider_pwm"
                    oninput="cambiarPWM()"
                >

            </div>

        </div>

        <!-- BOTON -->

        <div class="card">

            <div class="titulo-card">
                Push Button
            </div>

            <div class="estado" id="estado_boton">

                🔴 LIBRE

            </div>

        </div>

        <!-- LED -->

        <div class="card">

            <div class="titulo-card">
                LED Virtual
            </div>

            <div id="led_virtual"></div>

        </div>

    </div>

    <!-- GRAFICA -->

    <div class="grafica">

        <h2 style="margin-bottom:20px; color:cyan;">

            📈 Gráfica ADC Tiempo Real

        </h2>

        <canvas id="miGrafica"></canvas>

    </div>

    <div class="footer">

        Proyecto Final - Sistemas Embebidos 😎🔥

    </div>

    <script>

        // =========================================
        // VARIABLES
        // =========================================

        let etiquetas = [];

        let datosADC = [];

        let contador = 0;

        // =========================================
        // GRAFICA
        // =========================================

        const ctx = document.getElementById('miGrafica').getContext('2d');

        const chart = new Chart(ctx, {

            type: 'line',

            data: {

                labels: etiquetas,

                datasets: [{

                    label: 'Voltaje ADC',

                    data: datosADC,

                    borderColor: 'lime',

                    backgroundColor: 'lime',

                    borderWidth: 3,

                    fill: false,

                    tension: 0.3
                }]
            },

            options: {

                responsive: true,

                animation: true,

                scales: {

                    y: {

                        min: 0,

                        max: 3.3
                    }
                }
            }
        });

        // =========================================
        // PWM
        // =========================================

        function cambiarPWM(){

            let pwm = document.getElementById("slider_pwm").value;

            document.getElementById("pwm_valor").innerText =
                pwm + " %";

            // LED virtual

            const led = document.getElementById("led_virtual");

            if(pwm > 0){

                led.style.background = "lime";

                led.style.boxShadow = "0 0 30px lime";

            }else{

                led.style.background = "gray";

                led.style.boxShadow = "0 0 20px gray";
            }
        }

        // =========================================
        // DATOS SIMULADOS
        // =========================================

        function actualizarDatos(){

            // ADC aleatorio

            let adc = (Math.random() * 3.3).toFixed(3);

            document.getElementById("adc1").innerText =
                adc + " V";

            // BOTON random

            let boton = Math.random() > 0.5;

            if(boton){

                document.getElementById("estado_boton").innerHTML =
                    "🟢 PRESIONADO";

            }else{

                document.getElementById("estado_boton").innerHTML =
                    "🔴 LIBRE";
            }

            // GRAFICA

            contador++;

            etiquetas.push(contador);

            datosADC.push(adc);

            if(etiquetas.length > 20){

                etiquetas.shift();

                datosADC.shift();
            }

            chart.update();
        }

        // =========================================

        setInterval(actualizarDatos, 1000);

    </script>

</body>
</html>
